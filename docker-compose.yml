version: '3.8'

services:
  kartavci:
    build: .
    container_name: kartavci-bb
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    ports:
      - "8000:8000"
      - "8501:8501"
    command: python kartavci_bb.py --help

  dashboard:
    build: .
    container_name: kartavci-dashboard
    ports:
      - "8501:8501"
    command: streamlit run utils/dashboard.py
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
